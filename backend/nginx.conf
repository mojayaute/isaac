# Configuración de Nginx para IPH Backend
# Copiar a /etc/nginx/conf.d/iph-backend.conf en EC2

server {
    listen 80;
    server_name _;  # Cambiar por tu dominio si tienes uno

    # Logs
    access_log /var/log/nginx/iph-backend-access.log;
    error_log /var/log/nginx/iph-backend-error.log;

    # Configuración para el backend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        
        # Headers necesarios
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Cache bypass
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint (opcional)
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
